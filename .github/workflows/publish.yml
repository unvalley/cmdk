name: Publish package

on:
  push:
    tags:
      - "react-v*"
      - "vue-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. react-v0.0.2 or vue-v0.0.1)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ env.TAG_NAME }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @command-palette/react exec playwright install --with-deps chromium

      - name: Validate release tag
        id: release
        run: |
          tag="${TAG_NAME}"

          case "${tag}" in
            react-v*)
              package="react"
              version="${tag#react-v}"
              ;;
            vue-v*)
              package="vue"
              version="${tag#vue-v}"
              ;;
            *)
              echo "Tag ${tag} must start with react-v or vue-v."
              exit 1
              ;;
          esac

          package_name="@command-palette/${package}"
          package_dir="packages/${package}"
          package_version="$(node -p "require('./${package_dir}/package.json').version")"

          if [ -z "${version}" ] || [ "${tag}" = "${version}" ]; then
            echo "Tag ${tag} does not contain a version."
            exit 1
          fi

          if [ "${package_version}" != "${version}" ]; then
            echo "Tag ${tag} does not match package version ${package_version}."
            exit 1
          fi

          git fetch --tags --force origin
          tag_sha="$(git rev-list -n 1 "${tag}" 2>/dev/null || true)"
          if [ -z "${tag_sha}" ]; then
            echo "Tag ${tag} does not exist."
            exit 1
          fi

          git fetch origin main
          if ! git merge-base --is-ancestor "${tag_sha}" origin/main; then
            echo "Tag ${tag} points to ${tag_sha}, which is not contained in origin/main."
            exit 1
          fi

          if npm view "${package_name}@${version}" version >/dev/null 2>&1; then
            echo "${package_name}@${version} is already published."
            exit 1
          fi

          echo "package=${package}" >> "$GITHUB_OUTPUT"
          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "package_dir=${package_dir}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Verify
        run: pnpm check

      - name: Publish package
        working-directory: ${{ steps.release.outputs.package_dir }}
        run: npm publish --provenance --access public
