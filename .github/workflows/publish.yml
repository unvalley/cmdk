name: Publish @command-palette/react

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @command-palette/react exec playwright install --with-deps chromium

      - name: Verify
        run: pnpm check

      - name: Read package version
        id: package
        run: |
          version="$(node -p "require('./packages/react/package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=react-v${version}" >> "$GITHUB_OUTPUT"

      - name: Check package version is unpublished
        run: |
          if npm view "@command-palette/react@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "@command-palette/react@${{ steps.package.outputs.version }} is already published."
            exit 1
          fi

      - name: Create release tag
        run: |
          tag="${{ steps.package.outputs.tag }}"
          git fetch --tags --force

          existing_sha="$(git rev-list -n 1 "${tag}" 2>/dev/null || true)"
          if [ -n "${existing_sha}" ]; then
            if [ "${existing_sha}" != "${GITHUB_SHA}" ]; then
              echo "Tag ${tag} already exists on ${existing_sha}, not ${GITHUB_SHA}."
              exit 1
            fi

            echo "Tag ${tag} already exists on this commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "@command-palette/react ${{ steps.package.outputs.version }}"
          git push origin "${tag}"

      - name: Publish package
        run: pnpm --filter "@command-palette/react" exec npm publish --access public
